<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyFinance | Personal Tracker & Calculator</title>
    <style>
        :root {
            --primary: #4f46e5;
            --success: #22c55e;
            --danger: #ef4444;
            --dark: #1e293b;
            --light: #f8fafc;
            --gray: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body { background-color: #f1f5f9; color: var(--dark); padding: 20px; }

        .container { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: 1fr 350px; gap: 20px; }

        header { grid-column: 1 / -1; text-align: center; margin-bottom: 20px; }
        
        h1 { color: var(--primary); font-size: 2rem; }

        /* Dashboard Cards */
        .dashboard { grid-column: 1 / -1; display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); text-align: center; }
        .card h3 { font-size: 0.9rem; color: var(--gray); text-transform: uppercase; margin-bottom: 5px; }
        .card p { font-size: 1.5rem; font-weight: bold; }
        #balance { color: var(--primary); }
        #inc-display { color: var(--success); }
        #exp-display { color: var(--danger); }

        /* Main Tracker Section */
        .main-panel { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        
        form { display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 10px; margin-bottom: 30px; }
        input, select, button { padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; outline: none; }
        
        .btn-add { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-add:hover { background: #4338ca; }

        .transaction-list { list-style: none; }
        .transaction-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px; border-bottom: 1px solid #f1f5f9; transition: 0.2s;
        }
        .transaction-item:hover { background: #f8fafc; }
        .item-info span { display: block; font-size: 0.8rem; color: var(--gray); }
        .btn-delete { color: var(--danger); background: none; border: none; cursor: pointer; font-size: 1.1rem; }

        /* Calculator Section */
        .side-panel { display: flex; flex-direction: column; gap: 20px; }
        .calculator { background: var(--dark); padding: 20px; border-radius: 12px; color: white; }
        .calc-display { background: #334155; padding: 15px; text-align: right; border-radius: 8px; margin-bottom: 15px; font-size: 1.2rem; min-height: 54px; overflow: hidden; }
        .calc-buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .calc-btn { background: #475569; border: none; color: white; padding: 15px 5px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .calc-btn:hover { background: #64748b; }
        .calc-btn.op { background: var(--primary); }
        .calc-btn.equal { background: var(--success); grid-column: span 2; }
        .calc-btn.clear { background: var(--danger); grid-column: span 2; }

        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
            .dashboard { grid-template-columns: 1fr; }
            form { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>MyFinance</h1>
        <p>Simple & Smart Personal Finance Tracker</p>
    </header>

    <div class="dashboard">
        <div class="card">
            <h3>Total Balance</h3>
            <p id="balance">$ 0.00</p>
        </div>
        <div class="card">
            <h3>Income</h3>
            <p id="inc-display">$ 0.00</p>
        </div>
        <div class="card">
            <h3>Expenses</h3>
            <p id="exp-display">$ 0.00</p>
        </div>
    </div>

    <div class="main-panel">
        <form id="transaction-form">
            <input type="text" id="desc" placeholder="Description (e.g. Salary, Rent)" required>
            <input type="number" id="amount" placeholder="Amount" step="0.01" required>
            <select id="category">
                <option value="General">General</option>
                <option value="Food">Food</option>
                <option value="Transport">Transport</option>
                <option value="Leisure">Leisure</option>
                <option value="Utilities">Utilities</option>
            </select>
            <button type="submit" class="btn-add">Add</button>
        </form>

        <ul class="transaction-list" id="list">
            </ul>
    </div>

    <aside class="side-panel">
        <div class="calculator">
            <h3 style="margin-bottom: 10px; font-size: 1rem;">Quick Calculator</h3>
            <div class="calc-display" id="calc-screen">0</div>
            <div class="calc-buttons">
                <button class="calc-btn clear" onclick="clearCalc()">C</button>
                <button class="calc-btn op" onclick="appendCalc('/')">/</button>
                <button class="calc-btn op" onclick="appendCalc('*')">×</button>
                <button class="calc-btn" onclick="appendCalc('7')">7</button>
                <button class="calc-btn" onclick="appendCalc('8')">8</button>
                <button class="calc-btn" onclick="appendCalc('9')">9</button>
                <button class="calc-btn op" onclick="appendCalc('-')">-</button>
                <button class="calc-btn" onclick="appendCalc('4')">4</button>
                <button class="calc-btn" onclick="appendCalc('5')">5</button>
                <button class="calc-btn" onclick="appendCalc('6')">6</button>
                <button class="calc-btn op" onclick="appendCalc('+')">+</button>
                <button class="calc-btn" onclick="appendCalc('1')">1</button>
                <button class="calc-btn" onclick="appendCalc('2')">2</button>
                <button class="calc-btn" onclick="appendCalc('3')">3</button>
                <button class="calc-btn equal" onclick="calculateResult()">=</button>
                <button class="calc-btn" onclick="appendCalc('0')" style="grid-column: span 2;">0</button>
                <button class="calc-btn" onclick="appendCalc('.')">.</button>
            </div>
        </div>
    </aside>
</div>

<script>
    const form = document.getElementById('transaction-form');
    const list = document.getElementById('list');
    const balanceDisplay = document.getElementById('balance');
    const incomeDisplay = document.getElementById('inc-display');
    const expenseDisplay = document.getElementById('exp-display');

    // Load data from LocalStorage
    let transactions = JSON.parse(localStorage.getItem('transactions')) || [];

    function updateValues() {
        const amounts = transactions.map(t => t.amount);
        const total = amounts.reduce((acc, item) => (acc += item), 0).toFixed(2);
        const income = amounts.filter(item => item > 0).reduce((acc, item) => (acc += item), 0).toFixed(2);
        const expense = (amounts.filter(item => item < 0).reduce((acc, item) => (acc += item), 0) * -1).toFixed(2);

        balanceDisplay.innerText = `$ ${total}`;
        incomeDisplay.innerText = `$ ${income}`;
        expenseDisplay.innerText = `$ ${expense}`;
    }

    function addTransactionDOM(transaction) {
        const sign = transaction.amount < 0 ? '-' : '+';
        const colorClass = transaction.amount < 0 ? 'var(--danger)' : 'var(--success)';
        const item = document.createElement('li');

        item.classList.add('transaction-item');
        item.innerHTML = `
            <div class="item-info">
                <strong>${transaction.description}</strong>
                <span>${transaction.category}</span>
            </div>
            <div style="display: flex; align-items: center; gap: 15px;">
                <b style="color: ${colorClass}">${sign}$${Math.abs(transaction.amount).toFixed(2)}</b>
                <button class="btn-delete" onclick="removeTransaction(${transaction.id})">×</button>
            </div>
        `;
        list.appendChild(item);
    }

    function init() {
        list.innerHTML = '';
        transactions.forEach(addTransactionDOM);
        updateValues();
    }

    form.addEventListener('submit', (e) => {
        e.preventDefault();
        const transaction = {
            id: Math.floor(Math.random() * 1000000),
            description: document.getElementById('desc').value,
            amount: +document.getElementById('amount').value,
            category: document.getElementById('category').value
        };

        transactions.push(transaction);
        localStorage.setItem('transactions', JSON.stringify(transactions));
        init();
        form.reset();
    });

    function removeTransaction(id) {
        transactions = transactions.filter(t => t.id !== id);
        localStorage.setItem('transactions', JSON.stringify(transactions));
        init();
    }

    // Calculator Logic
    const calcScreen = document.getElementById('calc-screen');
    let calcExpression = "";

    function appendCalc(value) {
        if (calcExpression === "0" || calcExpression === "Error") calcExpression = "";
        calcExpression += value;
        calcScreen.innerText = calcExpression;
    }

    function clearCalc() {
        calcExpression = "0";
        calcScreen.innerText = calcExpression;
    }

    function calculateResult() {
        try {
            calcExpression = eval(calcExpression).toString();
            calcScreen.innerText = calcExpression;
        } catch {
            calcScreen.innerText = "Error";
            calcExpression = "";
        }
    }

    init();
</script>

</body>
</html>
